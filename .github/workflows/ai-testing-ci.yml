name: AI Testing CI Pipeline
on:
push:
branches:
- main
pull_request:
branches:
- main
jobs:
run-deterministic-tests:
runs-on: ubuntu-latest
steps:
- name: Checkout repository code
uses: actions/checkout@v7
- name: Set up Python
uses: actions/setup-python@v6
with:
python-version: "3.11"
- name: Install dependencies
run: |
python -m pip install --upgrade pip
pip install -r requirements.txt
- name: Create reports directory
run: |
mkdir -p reports
- name: Run deterministic AI validation tests with reports
run: |
python -m pytest -m "not tavily" \
--html=reports/deterministic-test-report.html \
--self-contained-html \
--junitxml=reports/deterministic-junit.xml
- name: Upload deterministic test reports
if: always()
uses: actions/upload-artifact@v7
with:
name: deterministic-ai-testing-reports
path: reports/
retention-days: 7
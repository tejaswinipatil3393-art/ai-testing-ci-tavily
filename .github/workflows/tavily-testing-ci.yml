name: Manual Tavily Testing Pipeline

on:
  workflow_dispatch:

jobs:
  run-tavily-tests:
    runs-on: ubuntu-latest

    env:
    TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create reports directory
        run: |
          mkdir -p reports

      - name: Run Tavily API tests with reports
        run: |
          python -m pytest -m tavily \
            --html=reports/tavily-test-report.html \
            --self-contained-html \
            --junitxml=reports/tavily-junit.xml

      - name: Upload Tavily test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tavily-testing-reports
          path: reports/
          retention-days: 7